<!DOCTYPE html>
<html>

<head>
<title>Produto</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f6ecff;
}

.container{
padding:40px;
}

img{
width:250px;
border-radius:10px;
}

button{
background:#7c3aed;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1 id="nome"></h1>

<img id="imagem">

<p id="preco"></p>

<button onclick="comprar()">Comprar</button>
<br><br>
<button onclick="voltar()">Voltar</button>

</div>

<script>

let dados = {
    batom: {
        nome: "Batom Matte",
        preco: "R$39,90",
        img: "https://i.ibb.co/RkvrThzp/batom.png"
    },
    perfume: {
        nome: "Perfume Floral",
        preco: "R$89,90",
        img: "https://i.ibb.co/XfmVVdPN/perfume.png"
    },
    creme: {
        nome: "Creme Hidratante",
        preco: "R$49,90",
        img: "https://i.ibb.co/WvdMtFLX/creme.png"
    }
};

let params = new URLSearchParams(window.location.search);
let produto = params.get("produto");

let p = dados[produto];

document.getElementById("nome").innerText = p.nome;
document.getElementById("preco").innerText = p.preco;
document.getElementById("imagem").src = p.img;

function comprar(){
alert("Compra realizada 💜");
}

function voltar(){
window.location.href = "loja.html";
}

</script>

</body>

</html>
