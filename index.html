<!DOCTYPE html>
<html>

<head>
<title>La Beauté Brasil</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6ecff;
}

header{
background:#8b5cf6;
color:white;
text-align:center;
padding:30px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.titulo{
font-size:32px;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px;
}

.produto{
background:white;
width:220px;
padding:20px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
}

.produto img{
width:100%;
border-radius:10px;
}

.preco{
color:#7c3aed;
font-weight:bold;
margin:10px;
font-size:18px;
}

button{
background:#7c3aed;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#6d28d9;
}

footer{
background:#ede9fe;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<div class="titulo">La Beauté Brasil</div>

</header>

<div class="container">

<div class="produto">

<img src="Batom.jpg">

<h3>Batom Matte</h3>

<div class="preco">R$39,90</div>

<button>Comprar</button>

</div>

<div class="produto">

<img src="Perfume.jpg">

<h3>Perfume Floral</h3>

<div class="preco">R$89,90</div>

<button>Comprar</button>

</div>

<div class="produto">

<img src="Creme.jpg">

<h3>Creme Hidratante</h3>

<div class="preco">R$49,90</div>

<button>Comprar</button>

</div>

</div>

<footer>
La Beauté Brasil © 2026
</footer>

</body>

</html>
