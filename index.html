<!DOCTYPE html>
<html>

<head>
<title>La Beauté Brasil</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6ecff;
}

header{
background:#8b5cf6;
color:white;
text-align:center;
padding:30px;
}

.logo{
width:120px;
margin-bottom:10px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px;
}

.produto{
background:white;
width:220px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
cursor:pointer;
}

.produto img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>La Beauté Brasil 💜</h1>
</header>

<div class="container">

<div class="produto" onclick="abrirProduto('batom')">
<img src="https://files.fm/u/dkme9wm54x">
<h3>Batom Matte</h3>
</div>

<div class="produto" onclick="abrirProduto('perfume')">
<img src="https://files.fm/u/6xrrjncdn9">
<h3>Perfume Floral</h3>
</div>

<div class="produto" onclick="abrirProduto('creme')">
<img src="https://files.fm/u/wxrhfctd55">
<h3>Creme Hidratante</h3>
</div>

</div>

<script>

function abrirProduto(nome){
    window.location.href = "produto.html?produto=" + nome;
}

</script>

</body>

</html>
