<!DOCTYPE html>
<html>

<head>
<title>La Beauté Brasil</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6ecff;
}

header{
background:#8b5cf6;
color:white;
text-align:center;
padding:30px;
}

.logo{
width:120px;
}

.titulo{
font-size:32px;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:40px;
}

.produto{
background:white;
width:220px;
padding:20px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
}

.produto img{
width:100%;
border-radius:10px;
}

.preco{
color:#7c3aed;
font-weight:bold;
margin:10px;
}

button{
background:#7c3aed;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#6d28d9;
}

.carrinho{
position:fixed;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>
<img src="logo.png" class="logo">
<div class="titulo">La Beauté Brasil</div>
</header>

<div class="carrinho">
🛒 Carrinho: <span id="total">0</span>
</div>

<div class="container">

<div class="produto">
<img src="batom.jpg">
<h3>Batom Matte</h3>
<div class="preco">R$39,90</div>
<button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
<img src="perfume.jpg">
<h3>Perfume Floral</h3>
<div class="preco">R$89,90</div>
<button onclick="comprar()">Comprar</button>
</div>

<div class="produto">
<img src="creme.jpg">
<h3>Creme Hidratante</h3>
<div class="preco">R$49,90</div>
<button onclick="comprar()">Comprar</button>
</div>

</div>

<script>

let total = 0;

function comprar(){
    total++;
    document.getElementById("total").innerText = total;
    alert("Produto adicionado ao carrinho 🛍️");
}

</script>

</body>

</html>
